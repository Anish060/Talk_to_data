<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk to Data</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Fira+Code&display=swap"
        rel="stylesheet">
    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        .badge-container {
    display: inline-flex;
    justify-content: flex-start;
    align-items: center;
    margin-bottom: 0.5rem;
    grid-column: 1 / -1; /* span full width of results grid */
}
.badge-container:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
}
        .cache-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    transition: all 0.3s ease;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    font-family: 'Outfit', sans-serif;
}
        .cache-badge.cached {
            background: rgba(46, 213, 115, 0.12);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.25);
            box-shadow: 0 0 12px rgba(46, 213, 115, 0.15);
        }
        .cache-badge.realtime {
            background: rgba(30, 144, 255, 0.12);
            color: #1e90ff;
            border: 1px solid rgba(30, 144, 255, 0.25);
        }
    </style>
</head>

<body>
    <div class="glass-bg"></div>

    <div class="container">
        <header>
            <div class="logo-container">
                <div class="logo-icon"></div>
                <h1>Talk to data</h1>
            </div>
            <p class="subtitle">Enterprise Intelligence via Natural Language</p>
        </header>

        <div class="query-area">
            <div class="query-box">
                <input type="text" id="queryInput"
                    placeholder="Ask your data anything... e.g., 'Top 10 customers in London by revenue'" autofocus>
                <button id="searchBtn">
                    <span>Analyze</span>
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor"
                            d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="loader" class="loader-container hidden">
            <div class="quantum-spinner"></div>
            <p>Reasoning across schema & values...</p>
        </div>

        <div id="results" class="results-layout hidden">
            <!-- Cache Pill Badge -->
            <div class="badge-container">
                <div id="cacheBadge" class="cache-badge"></div>
            </div>

            <aside class="reasoning-sidebar">
                <div class="card reasoning-card">
                    <h3><span class="icon">🔍</span> Reasoning Trace</h3>
                    <div id="intentDisplay" class="intent-section"></div>
                    <div class="divider"></div>
                    <h4>Logical Plan</h4>
                    <div id="planDisplay" class="plan-section"></div>
                </div>

                <div class="card context-card">
                    <h3><span class="icon">🔗</span> Schema Grounding</h3>
                    <div id="contextDisplay" class="context-content"></div>
                </div>
            </aside>

            <main class="main-content">
                <div class="card sql-card">
                    <div class="card-header">
                        <h3><span class="icon">💻</span> Generated SQL</h3>
                        <button class="copy-btn" onclick="copySQL()">Copy</button>
                    </div>
                    <pre><code id="sqlDisplay" class="language-sql"></code></pre>
                </div>

                <div class="card data-card">
                    <h3><span class="icon">📊</span> Results</h3>
                    <div id="tableContainer"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const queryInput = document.getElementById('queryInput');
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');

        searchBtn.addEventListener('click', async () => {
            const query = queryInput.value.trim();
            if (!query) return;

            loader.classList.remove('hidden');
            results.classList.add('hidden');

            try {
                const response = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Query failed');
                }

                const data = await response.json();

                // Update Cache Status Badge
                const badge = document.getElementById('cacheBadge');
                if (data.cached) {
                    badge.className = 'cache-badge cached';
                    badge.innerHTML = '<span>⚡</span> Cached (RAM)';
                } else {
                    badge.className = 'cache-badge realtime';
                    badge.innerHTML = '<span>❄️</span> Real-time Generation';
                }

                // 1. Intent & Plan
                document.getElementById('intentDisplay').innerHTML = `
                    <div class="intent-tag">Entities: ${data.intent.entities.join(', ')}</div>
                    <div class="intent-tag">Metrics: ${data.intent.metrics.join(', ')}</div>
                `;

                document.getElementById('planDisplay').innerHTML = `
                    <ul class="plan-list">
                        ${data.plan.steps.map(step => `<li>${step}</li>`).join('')}
                    </ul>
                `;

                // 2. Grounding
                const groundingDisplay = document.getElementById('contextDisplay');
                if (data.grounding && data.grounding.length > 0) {
                    groundingDisplay.innerHTML = `
                        <ul class="grounding-list">
                            ${data.grounding.map(g => `
                                <li>
                                    <span class="g-bullet"></span>
                                    ${g}
                                </li>
                            `).join('')}
                        </ul>
                    `;
                } else {
                    groundingDisplay.innerHTML = '<div class="empty-state">No semantic mappings needed.</div>';
                }

                // 3. SQL
                const sqlCode = document.getElementById('sqlDisplay');
                sqlCode.textContent = data.sql;
                Prism.highlightElement(sqlCode);

                // 4. Table
                renderTable(data.columns, data.results);

                results.classList.remove('hidden');
            } catch (error) {
                alert('Analysis Error: ' + error.message);
            } finally {
                loader.classList.add('hidden');
            }
        });

        function renderTable(columns, rows) {
            const container = document.getElementById('tableContainer');
            container.innerHTML = '';

            if (rows.length === 0) {
                container.innerHTML = '<div class="empty-state">No records found matching your query.</div>';
                return;
            }

            const table = document.createElement('table');
            table.innerHTML = `
                <thead>
                    <tr>${columns.map(c => `<th>${c}</th>`).join('')}</tr>
                </thead>
                <tbody>
                    ${rows.map(row => `
                        <tr>${columns.map(c => `<td>${row[c] !== null ? row[c] : '-'}</td>`).join('')}</tr>
                    `).join('')}
                </tbody>
            `;
            container.appendChild(table);
        }

        function copySQL() {
            const sql = document.getElementById('sqlDisplay').textContent;
            navigator.clipboard.writeText(sql);
            alert('SQL copied to clipboard');
        }

        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchBtn.click();
        });
    </script>
</body>

</html>
